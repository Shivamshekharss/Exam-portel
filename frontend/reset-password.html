<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password | PREPHUT</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-left">
      <img src="images/Prep_LOGO.png" alt="PrepHut Logo" class="logo-img" />
      <h2 class="logo">PREPHUT</h2>
    </div>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="login.html">Student Portal</a></li>
    </ul>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
  </nav>

  <div class="form-container">
    <h2>Reset Password</h2>
    <form id="resetPasswordForm">
      <!-- New Token Field -->
      <input type="text" id="resetToken" name="resetToken" placeholder="Reset Token" />
      <input type="password" id="newPassword" name="newPassword" placeholder="Enter New Password" required minlength="6" />
      <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm New Password" required minlength="6" />
      <button type="submit" class="btn">Reset Password</button>
    </form>
    <p class="form-link">Back to <a href="login.html">Login</a></p>
  </div>

  <script>
    // Function to toggle theme
    function toggleTheme() {
      document.body.classList.toggle('dark');
    }

    // Pre-fill the token field with the reset token from localStorage
    document.addEventListener('DOMContentLoaded', () => {
      const resetTokenField = document.getElementById('resetToken');
      const storedToken = localStorage.getItem('resetToken');
      if (storedToken) {
        resetTokenField.value = storedToken;
      } else {
        alert('No reset token found. Redirecting to login page.');
        window.location.href = 'login.html';
      }
    });

    // Handle Reset Password Form Submission
    document.getElementById('resetPasswordForm').addEventListener('submit', async function (event) {
      event.preventDefault();
      const resetToken = document.getElementById('resetToken').value.trim();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        alert('Passwords do not match!');
        return;
      }

      try {
        const res = await fetch('http://localhost:5000/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: resetToken, newPassword })
        });

        const data = await res.json();

        if (res.ok) {
          alert('🎉 Password reset successful! Redirecting to login page...');
          localStorage.removeItem('resetToken'); // Clear the token after successful reset
          window.location.href = 'login.html';
        } else {
          alert(data.message || 'Failed to reset password. Please try again.');
        }
      } catch (err) {
        console.error('Reset password error:', err);
        alert('An error occurred. Please try again later.');
      }
    });
  </script>
</body>
</html>
